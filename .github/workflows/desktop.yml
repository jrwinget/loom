name: Desktop

# Produces unsigned desktop installers for Loom across Linux, macOS,
# and Windows. Signing steps are env-gated: if the relevant secrets
# are not configured, the job logs a skip message and continues with
# an unsigned artifact. Tag builds (v*) also attach artifacts to a
# GitHub release.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    # run on prs that touch anything load-bearing for the desktop
    # bundle: the rust shell, the python sidecar, or this workflow
    # itself. the smoke step (added in #127) is the regression guard
    # against shipping a sidecar that does not bind a socket; gating
    # merges on it is the whole point.
    paths:
      - "desktop/**"
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/desktop.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # GitHub Actions does not allow `secrets` in step-level `if:`
    # conditions. Hoisting the boolean checks to job-level env
    # (which does allow secrets) lets the signing/skip steps
    # branch on env.HAS_*_SIGNING instead.
    env:
      HAS_WIN_SIGNING: >-
        ${{ secrets.WINDOWS_CERT_BASE64 != ''
            && secrets.WINDOWS_CERT_PASSWORD != '' }}
      HAS_APPLE_SIGNING: >-
        ${{ secrets.APPLE_SIGNING_IDENTITY != ''
            && secrets.APPLE_ID != ''
            && secrets.APPLE_TEAM_ID != ''
            && secrets.APPLE_PASSWORD != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            bundles: appimage,deb
            artifact_glob: |
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/deb/*.deb
          - os: macos-latest
            platform: macos
            bundles: dmg
            # tauri with `--bundles dmg` emits only the .dmg under
            # bundle/dmg/. listing bundle/macos/*.app here would
            # cause softprops/action-gh-release (fail_on_unmatched
            # _files: true) to fail the tag run with no matches.
            artifact_glob: |
              desktop/src-tauri/target/release/bundle/dmg/*.dmg
          # pinned to windows-2022 (not windows-latest, currently
          # windows-2025) because pyinstaller's pefile-based DLL walk
          # of `av` and `c2pa-python` hangs stochastically on the
          # 2025 fleet — same code, same lockfile, same defender
          # exclusions. observed on tag run 25113193779 and main
          # push 25115976456. revisit once the 2025 image stabilizes.
          - os: windows-2022
            platform: windows
            bundles: msi,nsis
            artifact_glob: |
              desktop/src-tauri/target/release/bundle/msi/*.msi
              desktop/src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # node + pnpm for the frontend build and the tauri CLI invocation
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      # python + uv for the backend sidecar build
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: >-
            uv-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      # rust toolchain + cargo cache for the tauri build
      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: >-
            cargo-${{ runner.os }}-${{ hashFiles('desktop/src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-

      # linux-only system deps required by tauri v2 / webkit2gtk
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      # frontend bundle becomes the static webview payload for tauri
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
        continue-on-error: false

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
        continue-on-error: false

      # windows-only: silence every windows component that can gate
      # a DLL load on a network call. the silent build hang at
      # `Looking for dynamic libraries` (tag run 25113193779, main
      # push 25115976456, dispatch 25118057855) is pyinstaller's
      # isolated import subprocess sitting forever on `import av`,
      # because windows tries to resolve smartscreen reputation for
      # the freshly-downloaded ffmpeg DLLs in `av.libs`. realtime AV
      # is one source of the hang; smartscreen + the MAPS cloud
      # lookup are the others, and they live behind separate flags.
      #
      # we disable the lot for the job's lifetime. the runner is
      # ephemeral, so there is no state to clean up. exclusions are
      # kept as belt-and-suspenders.
      - name: Windows - silence defender + smartscreen
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Set-MpPreference -DisableScriptScanning $true
          Set-MpPreference -DisableArchiveScanning $true
          # block-at-first-seen and MAPS reporting are the smartscreen
          # / cloud-lookup paths that gate dll loads on a network call
          Set-MpPreference -DisableBlockAtFirstSeen $true
          Set-MpPreference -MAPSReporting 0
          Set-MpPreference -SubmitSamplesConsent 2
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Get-MpPreference |
            Select-Object DisableRealtimeMonitoring,
                          DisableScriptScanning,
                          DisableArchiveScanning,
                          DisableBlockAtFirstSeen,
                          MAPSReporting,
                          SubmitSamplesConsent |
            Format-List

      # backend sidecar: install python deps first, then (on
      # windows) strip mark-of-the-web from every file in the venv,
      # then run pyinstaller. splitting the install and bundle steps
      # lets us insert the windows-only Unblock-File between them.
      #
      # extras list deliberately excludes `ai` (faster-whisper,
      # pyannote, scenedetect) and `dev` (pytest, ruff, mypy).
      # the AI deps drag in torch + torchcodec, whose Windows DLLs
      # are not present in PyInstaller's bundle scope and cause the
      # sidecar build to crash mid-collect on windows-latest. the
      # AI features run as opt-in extras installed separately on
      # the host; the bundled sidecar stays slim.
      - name: Install backend dependencies
        working-directory: backend
        shell: bash
        timeout-minutes: 10
        run: >-
          uv sync
          --extra desktop
          --extra report
          --extra url-ingest
          --extra provenance
          --extra observability

      # windows-only: strip MOTW (Zone.Identifier alternate data
      # stream) from every file in the venv. wheels fetched from
      # PyPI by `uv sync` carry MOTW; when pyinstaller's isolated
      # import subprocess later does `import av`, windows tries to
      # resolve smartscreen reputation for the freshly-downloaded
      # ffmpeg DLLs in `av.libs`, which involves a cloud lookup
      # that can stall for 10+ minutes on github runners. removing
      # the ADS lets the DLL load proceed without that round-trip.
      # this is the actual fix for the "Looking for dynamic
      # libraries" hang documented above.
      - name: Windows - strip MOTW from venv
        if: matrix.platform == 'windows'
        working-directory: backend
        shell: pwsh
        run: |
          $count = 0
          Get-ChildItem -Path .venv -Recurse -File `
            -ErrorAction SilentlyContinue |
            ForEach-Object {
              try {
                Unblock-File -Path $_.FullName -ErrorAction Stop
                $count++
              } catch {}
            }
          Write-Host "stripped MOTW from $count files in .venv"

      # `--clean` discards any pyinstaller work/build cache restored
      # from the actions cache, which can otherwise leave the build
      # in a broken half-state on rerun. `timeout-minutes` guards
      # against future regressions — fail fast at 15m so a hung
      # runner surfaces as a failure instead of burning the whole
      # job budget.
      # entrypoint is `src/loom/__main__.py`, which calls
      # `uvicorn.run(loom.main:app, host=127.0.0.1, port=8000)`.
      # `loom.main` itself only constructs the ASGI app -- bundling
      # it as the binary entrypoint (as v0.1.0 and v0.1.1 did) leaves
      # the sidecar with no listening socket, which is exactly the
      # boot hang those releases ship.
      #
      # `--collect-submodules uvicorn` replaces the long list of
      # uvicorn.* `--hidden-import` flags. community practice
      # (encode/uvicorn#939, pyinstaller hooks) is to also pin
      # `uvicorn.logging` and `uvicorn.loops.auto` explicitly because
      # collect-submodules's dynamic-import discovery misses both.
      # the alembic dir + ini are bundled with `--add-data` so the
      # frozen binary can read the alembic head revision and stamp
      # alembic_version at startup. the schema itself is materialised
      # from sqlalchemy metadata (alembic's add_column-with-fk
      # migrations don't run against sqlite without batch mode), but
      # alembic_version still needs the head id so future migrations
      # have a starting point. without these data files a fresh
      # desktop-lite install would have zero tables and
      # /first-run/status would 500 on `SELECT COUNT(*) FROM users`.
      # pyinstaller's --add-data uses `;` on windows and `:`
      # everywhere else (see the pyinstaller manual); pick the
      # separator from matrix.platform since bash on the windows
      # runner still has unix-style PATH.
      - name: Build backend sidecar
        working-directory: backend
        shell: bash
        timeout-minutes: 15
        run: |
          set -euo pipefail
          if [ "${{ matrix.platform }}" = "windows" ]; then
            sep=";"
          else
            sep=":"
          fi
          uv run pyinstaller --onefile --clean --noconfirm \
            src/loom/__main__.py \
            --name loom-backend \
            --distpath dist \
            --add-data "alembic${sep}alembic" \
            --add-data "alembic.ini${sep}." \
            --hidden-import fastapi \
            --hidden-import fastapi.routing \
            --hidden-import sqlalchemy \
            --hidden-import sqlalchemy.dialects.sqlite \
            --hidden-import sqlalchemy.dialects.postgresql \
            --hidden-import sqlalchemy.dialects.sqlite.aiosqlite \
            --hidden-import aiosqlite \
            --collect-submodules uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops.auto
        continue-on-error: false

      # smoke-test the sidecar binary before tauri bundles it. this
      # is the long-term guard against the v0.1.0/v0.1.1 regression
      # where the binary built fine but exited without binding a
      # socket. the script polls /api/v1/health for up to 60s, matching
      # the desktop shell's own HEALTH_TIMEOUT — anything slower would
      # fail the operator's launch too, so the smoke fails on the same
      # condition. the 5-minute step timeout is slack for windows
      # cold-start under av exclusions that did not fully apply.
      - name: Smoke-test sidecar binary
        working-directory: backend
        shell: bash
        timeout-minutes: 5
        run: |
          set -euo pipefail
          if [ "${{ matrix.platform }}" = "windows" ]; then
            binary="dist/loom-backend.exe"
          else
            binary="dist/loom-backend"
          fi
          uv run python scripts/smoke_sidecar.py "$binary"

      # tauri v2 expects sidecar binaries declared in `externalBin`
      # to be suffixed with the rust target triple, e.g.
      # `loom-backend-x86_64-unknown-linux-gnu`. pyinstaller produces
      # a bare name, so rename the artifact in place. the triple is
      # read from rustc itself rather than hardcoded so the same step
      # works for x86_64 linux, arm64/x86_64 macOS, and x86_64
      # windows-msvc.
      - name: Rename sidecar with rust target triple
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail
          triple=$(rustc -vV | sed -n 's/^host: //p')
          if [ -z "$triple" ]; then
            echo "could not detect rust target triple" >&2
            exit 1
          fi
          if [ "${{ matrix.platform }}" = "windows" ]; then
            mv "dist/loom-backend.exe" "dist/loom-backend-${triple}.exe"
          else
            mv "dist/loom-backend" "dist/loom-backend-${triple}"
          fi
          ls -la dist/

      # tauri bundle: per-os bundle flags, --ci suppresses prompts
      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install
        continue-on-error: false

      # purge any pre-built bundles restored from the cargo cache.
      # the `desktop/src-tauri/target` cache (keyed by Cargo.toml
      # hash) preserves `target/release/bundle/{deb,nsis,msi,dmg,
      # appimage}/*` from prior runs at different versions. the
      # upload globs below match those leftover files too, which
      # is how the v0.1.1 re-cut briefly ended up with mixed
      # Loom_0.1.0_* and Loom_0.1.2_* artifacts attached. fresh
      # bundles get rebuilt by ``tauri build`` regardless.
      - name: Purge cached Tauri bundles
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          rm -rf target/release/bundle
          echo "bundle dir cleaned"

      - name: Build Tauri bundles
        working-directory: desktop
        shell: bash
        run: npx tauri build --bundles ${{ matrix.bundles }} --ci
        continue-on-error: false

      # ------------------------------------------------------------------
      # signing (env-gated). each signing step is guarded by an `if:`
      # expression that short-circuits when the secret is empty, and
      # sets continue-on-error: true so a missing secret can never
      # fail the job. unsigned artifacts ship as-is.
      # ------------------------------------------------------------------

      - name: Windows - sign installers
        if: >-
          matrix.platform == 'windows' &&
          env.HAS_WIN_SIGNING == 'true'
        continue-on-error: true
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "loom-signing.pfx"
          [IO.File]::WriteAllBytes(
            $certPath,
            [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          )
          $signtool = (Get-ChildItem `
            "C:/Program Files (x86)/Windows Kits/10/bin" `
            -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match 'x64' } |
            Select-Object -First 1).FullName
          $bundleRoot = "desktop/src-tauri/target/release/bundle"
          Get-ChildItem -Path $bundleRoot -Recurse `
            -Include *.msi,*.exe | ForEach-Object {
              & $signtool sign `
                /f $certPath `
                /p $env:WINDOWS_CERT_PASSWORD `
                /tr http://timestamp.digicert.com `
                /td sha256 `
                /fd sha256 `
                $_.FullName
            }

      - name: Windows - signing skipped notice
        if: >-
          matrix.platform == 'windows' &&
          env.HAS_WIN_SIGNING != 'true'
        shell: bash
        run: |
          echo "signing skipped (no secrets present) — artifact is unsigned"

      - name: macOS - codesign + notarize + staple
        if: >-
          matrix.platform == 'macos' &&
          env.HAS_APPLE_SIGNING == 'true'
        continue-on-error: true
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
        run: |
          set -euo pipefail
          BUNDLE_ROOT="desktop/src-tauri/target/release/bundle"
          # sign any .app bundles produced by tauri
          find "$BUNDLE_ROOT" -name "*.app" -type d | while read -r app; do
            codesign --force --deep --options runtime \
              --sign "$APPLE_SIGNING_IDENTITY" "$app"
          done
          # submit each .dmg to notarytool, then staple
          find "$BUNDLE_ROOT/dmg" -name "*.dmg" | while read -r dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_PASSWORD" \
              --wait
            xcrun stapler staple "$dmg"
          done

      - name: macOS - signing skipped notice
        if: >-
          matrix.platform == 'macos' &&
          env.HAS_APPLE_SIGNING != 'true'
        run: |
          echo "signing skipped (no secrets present) — artifact is unsigned"

      # linux ships unsigned by policy — appimage and deb do not
      # participate in a publisher-trust chain the way msi/dmg do.
      - name: Linux - signing not required
        if: matrix.platform == 'linux'
        run: |
          echo "linux builds ship unsigned by design (AppImage + .deb)"

      # ------------------------------------------------------------------
      # artifact upload + (on tag) attach to github release
      # ------------------------------------------------------------------

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: loom-desktop-${{ matrix.platform }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_glob }}
          fail_on_unmatched_files: true
