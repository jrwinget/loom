name: CI

on:
  push:
    branches: [staging, main]
  pull_request:
    branches: [staging, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Ruff check
        working-directory: backend
        run: uv run ruff check src tests

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check src tests

      - name: Mypy
        working-directory: backend
        run: uv run mypy src

  lint-frontend:
    name: Lint Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: ESLint
        working-directory: frontend
        run: pnpm lint

      - name: Prettier
        working-directory: frontend
        run: pnpm format:check

      - name: TypeScript
        working-directory: frontend
        run: pnpm typecheck

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: loom
          POSTGRES_PASSWORD: loom_test
          POSTGRES_DB: loom_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U loom"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      minio:
        image: bitnami/minio:latest
        env:
          MINIO_ROOT_USER: loom_minio
          MINIO_ROOT_PASSWORD: loom_minio_test
          MINIO_DEFAULT_BUCKETS: "loom-originals,loom-derivatives"
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      LOOM_DATABASE_URL: >-
        postgresql+asyncpg://loom:loom_test@localhost:5432/loom_test
      LOOM_MINIO_ENDPOINT: localhost:9000
      LOOM_MINIO_ACCESS_KEY: loom_minio
      LOOM_MINIO_SECRET_KEY: loom_minio_test
      LOOM_MINIO_SECURE: "false"
      LOOM_SECRET_KEY: test-secret-key-that-is-long-enough-for-ci
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: uv sync --all-extras

      - name: Run tests
        working-directory: backend
        run: >-
          uv run pytest
          --cov=loom
          --cov-report=term-missing
          --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: frontend
        run: pnpm test -- --coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: pnpm build
