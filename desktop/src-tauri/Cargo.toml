[package]
name = "loom-desktop"
version = "0.1.0"
edition = "2021"
description = "Tauri v2 desktop shell for the Loom evidence OS"
license = "AGPL-3.0-or-later"
publish = false

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
tauri-plugin-store = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time", "process"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
dirs = "5"

[features]
# this feature is used for production builds or when a dev server is
# not specified, DO NOT REMOVE!!
custom-protocol = ["tauri/custom-protocol"]
