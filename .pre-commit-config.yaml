repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: ['--allow-multiple-documents']

  # backend: ruff lint + format (uses project's ruff config)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # frontend: use local toolchain so versions match package.json
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: pnpm --dir frontend exec prettier --write --ignore-unknown
        language: system
        files: ^frontend/src/.*\.(ts|tsx|css)$
        pass_filenames: true

      - id: eslint
        name: eslint
        entry: pnpm --dir frontend exec eslint --max-warnings=0
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: true

      - id: typecheck
        name: tsc --noEmit
        entry: pnpm --dir frontend exec tsc --noEmit
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-d, '{extends: relaxed, rules: {line-length: {max: 120}}}']

  # version lockstep: the five version-bearing files must agree, and a
  # release/* branch name must match them. blocks the push, not the
  # commit, so wip commits stay cheap.
  - repo: local
    hooks:
      - id: version-sync
        name: version sync
        entry: bash -c 'scripts/check-version-sync.sh "$(git symbolic-ref --short -q HEAD)"'
        language: system
        stages: [pre-push]
        pass_filenames: false
        always_run: true
