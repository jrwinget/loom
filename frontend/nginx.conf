server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # spa fallback — serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # proxy api to backend (resolved at request time so
    # nginx starts even when the backend host is absent)
    location /api/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $upstream http://backend:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 100m;
    }

    # cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # security headers. CSP allows the same-origin api calls this
    # image proxies (/api/) plus inline styles for vite's dev hmr;
    # tighten script-src when we stop using any inline bootstrap.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
}
