# shared logging policy applied to every service. caps each
# container's json-file logs at 100 MB with 10 rotated files
# (1 GB total per service) so /var/lib/docker/containers does
# not grow unbounded.
x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "10"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-loom}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loom"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - loom-data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - loom-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging

  minio-setup:
    image: minio/mc:RELEASE.2024-11-07T00-31-49Z
    depends_on:
      minio:
        condition: service_healthy
    # bootstraps buckets + enables SSE-S3 (AES-256) so every
    # object is encrypted at rest regardless of client settings.
    # operators using an external KMS should set
    # MINIO_KMS_KES_KEY_NAME and switch to `mc encrypt set sse-kms`
    # — see docs/security/encryption.md.
    entrypoint: >
      /bin/sh -c "
      mc alias set loom http://minio:9000
        ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
        ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env};
      mc mb --ignore-existing loom/loom-originals;
      mc mb --ignore-existing loom/loom-derivatives;
      mc mb --ignore-existing loom/loom-backups;
      mc anonymous set none loom/loom-originals;
      mc anonymous set none loom/loom-derivatives;
      mc anonymous set none loom/loom-backups;
      mc encrypt set sse-s3 loom/loom-originals;
      mc encrypt set sse-s3 loom/loom-derivatives;
      mc encrypt set sse-s3 loom/loom-backups;
      exit 0;
      "
    networks:
      - loom-data
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *default-logging

  # NOTE: auto-setup is for development only.
  # production deployments should use temporalio/server
  # with proper schema migrations and dynamicconfig/production.yaml.
  temporal:
    image: temporalio/auto-setup:1.25.2
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamicconfig/development.yaml
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: loom
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/dynamicconfig
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - loom-app
      - loom-data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    logging: *default-logging

  temporal-ui:
    image: temporalio/ui:2.34.0
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "${TEMPORAL_UI_PORT:-8080}:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - loom-app
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      LOOM_DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-loom}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-loom}
      LOOM_MINIO_ENDPOINT: minio:9000
      LOOM_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      LOOM_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      LOOM_MINIO_SECURE: "false"
      LOOM_TEMPORAL_HOST: temporal:7233
      LOOM_SECRET_KEY: ${LOOM_SECRET_KEY:?Set LOOM_SECRET_KEY in .env}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    networks:
      - loom-app
      - loom-data
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.5"
    logging: *default-logging
    profiles:
      - app

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    environment:
      LOOM_DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-loom}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-loom}
      LOOM_MINIO_ENDPOINT: minio:9000
      LOOM_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      LOOM_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      LOOM_MINIO_SECURE: "false"
      LOOM_TEMPORAL_HOST: temporal:7233
      LOOM_SECRET_KEY: ${LOOM_SECRET_KEY:?Set LOOM_SECRET_KEY in .env}
      # exposed only on the loom-app docker network so prometheus
      # can scrape; not published to the host.
      LOOM_WORKER_METRICS_ADDR: 0.0.0.0:9100
    expose:
      - "9100"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      temporal:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    networks:
      - loom-app
      - loom-data
    # AI workloads (faster-whisper, scenedetect, pytesseract)
    # are CPU-bound and memory-hungry; size accordingly.
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    logging: *default-logging
    profiles:
      - app

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      - backend
    networks:
      - loom-app
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging
    profiles:
      - app

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8888}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - loom-app
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging: *default-logging
    profiles:
      - production

  backup:
    image: postgres:16-alpine
    entrypoint: >
      /bin/sh -c "
      echo 'loom backup scheduler starting';
      apk add --no-cache curl;
      curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc;
      chmod +x /usr/local/bin/mc;
      echo 'running initial backup';
      /scripts/backup.sh;
      echo 'entering schedule loop (every 24h)';
      while true; do
        sleep 86400;
        /scripts/backup.sh;
      done
      "
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-loom}
      PGHOST: postgres
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?Set MINIO_ROOT_USER in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?Set MINIO_ROOT_PASSWORD in .env}
      MINIO_BACKUP_BUCKET: loom-backups
    volumes:
      - backup-data:/backups
      - ./postgres/backup.sh:/scripts/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    networks:
      - loom-data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    profiles:
      - backup

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - loom-app
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    profiles:
      - observability

  grafana:
    image: grafana/grafana:11-alpine
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    depends_on:
      - prometheus
    networks:
      - loom-app
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging: *default-logging
    profiles:
      - observability

  jaeger:
    image: jaegertracing/all-in-one:1.54
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
    networks:
      - loom-app
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging: *default-logging
    profiles:
      - observability

# two-tier network split: loom-data carries postgres + minio
# (the data plane); loom-app carries everything else. backend,
# worker, temporal, backup, and minio-setup join both because
# they need the data plane. nginx, frontend, temporal-ui, and
# the observability stack stay on loom-app, so a compromise of
# the edge tier cannot reach postgres or minio over docker DNS.
networks:
  loom-app:
    driver: bridge
  loom-data:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  backup-data:
  prometheus-data:
  grafana-data:
