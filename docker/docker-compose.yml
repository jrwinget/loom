services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loom_dev}
      POSTGRES_DB: ${POSTGRES_DB:-loom}
    ports:
      - "${POSTGRES_BIND:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loom"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - database

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-loom_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-loom_minio_dev}
    ports:
      - "${MINIO_BIND:-127.0.0.1}:${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_BIND:-127.0.0.1}:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  minio-setup:
    image: minio/mc:RELEASE.2024-11-07T00-52-20Z
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.25'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set loom http://minio:9000
        $${MINIO_ROOT_USER:-loom_minio}
        $${MINIO_ROOT_PASSWORD:-loom_minio_dev};
      mc mb --ignore-existing --with-lock loom/loom-originals;
      mc mb --ignore-existing loom/loom-derivatives;
      mc mb --ignore-existing loom/loom-backups;
      mc anonymous set none loom/loom-originals;
      mc anonymous set none loom/loom-derivatives;
      mc anonymous set none loom/loom-backups;
      mc retention set --default compliance 365d loom/loom-originals || true;
      exit 0;
      "
    networks:
      - backend

  temporal:
    image: temporalio/auto-setup:1.25.2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-loom_dev}
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: /etc/temporal/dynamicconfig/development.yaml
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: loom
    ports:
      - "${TEMPORAL_BIND:-127.0.0.1}:${TEMPORAL_PORT:-7233}:7233"
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/dynamicconfig
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - backend
      - database

  temporal-ui:
    image: temporalio/ui:2.34.0
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "${TEMPORAL_BIND:-127.0.0.1}:${TEMPORAL_UI_PORT:-8080}:8080"
    depends_on:
      temporal:
        condition: service_healthy
    networks:
      - backend

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      LOOM_DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-loom}:${POSTGRES_PASSWORD:-loom_dev}@postgres:5432/${POSTGRES_DB:-loom}
      LOOM_MINIO_ENDPOINT: minio:9000
      LOOM_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-loom_minio}
      LOOM_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-loom_minio_dev}
      LOOM_MINIO_SECURE: "false"
      LOOM_TEMPORAL_HOST: temporal:7233
      LOOM_SECRET_KEY: ${LOOM_SECRET_KEY:?Set LOOM_SECRET_KEY in .env}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    profiles:
      - app
    networks:
      - frontend
      - backend
      - database

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '2.0'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      LOOM_DATABASE_URL: >-
        postgresql+asyncpg://${POSTGRES_USER:-loom}:${POSTGRES_PASSWORD:-loom_dev}@postgres:5432/${POSTGRES_DB:-loom}
      LOOM_MINIO_ENDPOINT: minio:9000
      LOOM_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-loom_minio}
      LOOM_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-loom_minio_dev}
      LOOM_MINIO_SECURE: "false"
      LOOM_TEMPORAL_HOST: temporal:7233
      LOOM_SECRET_KEY: ${LOOM_SECRET_KEY:?Set LOOM_SECRET_KEY in .env}
    depends_on:
      temporal:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    profiles:
      - app
    networks:
      - backend
      - database

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    ports:
      - "3000:80"
    depends_on:
      - backend
    profiles:
      - app
    networks:
      - frontend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    ports:
      - "${NGINX_PORT:-8888}:80"
      - "${NGINX_TLS_PORT:-8443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${TLS_CERT_DIR:-./nginx/certs}:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    profiles:
      - production
    networks:
      - frontend
      - backend

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    entrypoint: >
      /bin/sh -c "
      echo 'loom backup scheduler starting';
      apk add --no-cache curl gnupg;
      curl -sL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc;
      chmod +x /usr/local/bin/mc;
      echo 'running initial backup';
      /scripts/backup.sh;
      echo 'entering schedule loop (every 24h)';
      while true; do
        sleep 86400;
        /scripts/backup.sh;
      done
      "
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loom_dev}
      POSTGRES_DB: ${POSTGRES_DB:-loom}
      PGHOST: postgres
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-loom_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-loom_minio_dev}
      MINIO_BACKUP_BUCKET: loom-backups
      BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT:-}
    volumes:
      - backup-data:/backups
      - ./postgres/backup.sh:/scripts/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    profiles:
      - backup
    networks:
      - backend
      - database

  jaeger:
    image: jaegertracing/all-in-one:1.54
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "${JAEGER_BIND:-127.0.0.1}:${JAEGER_UI_PORT:-16686}:16686"
      - "${JAEGER_BIND:-127.0.0.1}:${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
    profiles:
      - observability
    networks:
      - backend

volumes:
  postgres-data:
  minio-data:
  backup-data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  database:
    driver: bridge
